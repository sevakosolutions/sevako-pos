<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sevako POS</title>
<style>
  body{margin:0;background:#0d0d0d;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'DM Sans',sans-serif;}
  .loader{text-align:center;color:#f0ede8;}
  .logo{font-size:32px;font-weight:700;letter-spacing:-1px;margin-bottom:8px;}
  .logo span{color:#f0a500;}
  .sub{font-size:11px;color:#6e6a63;letter-spacing:3px;text-transform:uppercase;}
  .spinner{width:32px;height:32px;border:3px solid #2e2e2e;border-top-color:#f0a500;border-radius:50%;animation:spin .8s linear infinite;margin:24px auto 0;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="loader">
  <div class="logo">Sevako<span>.</span></div>
  <div class="sub">Loading your workspace…</div>
  <div class="spinner"></div>
</div>
<script>
  var host = window.location.hostname;
  var parts = host.split('.');
  var sub = parts.length >= 3 ? parts[0] : null;

  // Map subdomains to their HTML files
  var routes = {
    // Retail tenants → retail POS
    'pos-demo'    : '/sevako-retail-pos.html',
    'tripathi'    : '/sevako-retail-pos.html',

    // Salon tenants → salon POS
    'glowstudio'  : '/sevako-salon-pos.html',

    // SuperAdmin
    'admin'       : '/sevako-superadmin.html',
    'superadmin'  : '/sevako-superadmin.html',
  };

  if (sub && routes[sub]) {
    // Known subdomain — redirect to correct app
    window.location.replace(routes[sub]);
  } else if (!sub || parts.length < 3) {
    // No subdomain (direct GitHub Pages access or localhost)
    // Show app selector
    document.querySelector('.sub').textContent = 'Select an app';
    document.querySelector('.spinner').style.display = 'none';
    document.querySelector('.loader').innerHTML +=
      '<div style="margin-top:32px;display:flex;flex-direction:column;gap:12px;">'
      + '<a href="/sevako-retail-pos.html" style="display:block;padding:14px 28px;background:#f0a500;color:#000;border-radius:8px;text-decoration:none;font-weight:700;font-size:14px;">🛒 Retail POS</a>'
      + '<a href="/sevako-salon-pos.html" style="display:block;padding:14px 28px;background:#c8753a;color:#fff;border-radius:8px;text-decoration:none;font-weight:700;font-size:14px;">💆 Salon POS</a>'
      + '<a href="/sevako-superadmin.html" style="display:block;padding:14px 28px;background:#1e1e1e;color:#f0ede8;border:1px solid #3a3a3a;border-radius:8px;text-decoration:none;font-weight:700;font-size:14px;">⚙️ SuperAdmin</a>'
      + '</div>';
  } else {
    // Unknown subdomain — try retail POS as default
    window.location.replace('/sevako-retail-pos.html');
  }
</script>
</body>
</html>
